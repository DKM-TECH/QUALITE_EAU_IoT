<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Water Quality Monitoring - Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg:#0b0016;
    --card:#1a0935;
    --cyan:#00f5ff;
    --green:#00ff88;
    --text:#ffffff;
    --soft:#bdb7e8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0e001b,
    #17002d,
    #10001d
    );
}

.login-container{

    width:420px;

    background:rgba(26,9,53,.95);

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:40px;

    backdrop-filter:blur(12px);

    box-shadow:
    0 15px 40px rgba(0,0,0,.45);
}

.logo{

    text-align:center;
    margin-bottom:25px;
}

.logo-icon{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:42px;

    color:var(--cyan);

    background:
    rgba(0,245,255,.08);

    border:
    2px solid rgba(0,245,255,.25);

    box-shadow:
    0 0 30px rgba(0,245,255,.2);
}

.logo h1{
    margin-top:15px;
    font-size:24px;
    color:white;
}

.logo p{
    margin-top:8px;
    color:var(--soft);
    font-size:13px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{

    display:block;
    margin-bottom:8px;

    color:var(--soft);
    font-size:13px;
}

.input-box{

    position:relative;
}

.input-box i{

    position:absolute;
    left:15px;
    top:50%;

    transform:translateY(-50%);

    color:var(--cyan);
}

.input-box input{

    width:100%;
    height:50px;

    border:none;
    outline:none;

    border-radius:14px;

    background:#241046;

    color:white;

    padding-left:45px;
    padding-right:15px;

    font-size:14px;
}

.input-box input:focus{

    border:1px solid var(--cyan);

    box-shadow:
    0 0 15px rgba(0,245,255,.2);
}

.options{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:25px;

    font-size:13px;
}

.options a{
    color:var(--cyan);
    text-decoration:none;
}

.login-btn{

    width:100%;
    height:52px;

    border:none;
    border-radius:14px;

    cursor:pointer;

    font-size:15px;
    font-weight:700;

    background:
    linear-gradient(
    135deg,
    #00f5ff,
    #00ff88
    );

    color:#000;

    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 25px rgba(0,245,255,.3);
}

.footer{

    text-align:center;
    margin-top:20px;

    color:var(--soft);
    font-size:12px;
}

.footer span{
    color:var(--cyan);
}

</style>
</head>
<body>

<div class="login-container">

    <div class="logo">

        <div class="logo-icon">
            💧
        </div>

        <h1>Water Quality Monitoring</h1>

        <p>
            Intelligent IoT Monitoring Platform
        </p>

    </div>

    <form id="loginForm">

        <div class="form-group">

            <label>Email</label>

            <div class="input-box">

                <i class="fa fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="admin@example.com"
                required>

            </div>

        </div>

        <div class="form-group">

            <label>Mot de passe</label>

            <div class="input-box">

                <i class="fa fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="********"
                required>

            </div>

        </div>

        <div class="options">

            <label>
                <input type="checkbox">
                Se souvenir de moi
            </label>

            <a href="#">
                Mot de passe oublié ?
            </a>

        </div>

        <button
        type="submit"
        class="login-btn">

            Se connecter

        </button>

    </form>

    <div class="footer">

        © 2026 <span>LAU_Tech</span>

    </div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // 🔐 identifiants admin
    const adminEmail = "admin@gmail.com";
    const adminPassword = "admin123";

    if (email === adminEmail && password === adminPassword) {

        // ✅ connexion OK → redirection
        window.location.href = "dashbord.html"; // ta 2e page

    } else {

        // ❌ erreur
        alert("Email ou mot de passe incorrect");

    }

});

</script>

</body>
</html>
